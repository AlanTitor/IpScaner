<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <h1>Список узлов</h1>

        <div class="card">
            <div class="card-body">
                <form id="add-node-form">
                    <fieldset>
                        <legend>Добавить узел</legend>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="ip-input">IP Address</label>
                                <input type="text" id="ip-input" name="ip" placeholder="192.168.0.1" required />
                            </div>

                            <div class="form-field">
                                <label for="type-select">Type</label>
                                <select id="type-select" name="type" required>
                                    <option value="USER">USER</option>
                                    <option value="ROUTER">ROUTER</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-field">
                                <label for="tag-input">Tag</label>
                                <input type="text" id="tag-input" name="tag" placeholder="home" />
                            </div>

                            <div class="form-field" style="display: flex; align-items: flex-end; justify-content: flex-end;">
                                <button type="submit">Добавить</button>
                            </div>
                        </div>
                    </fieldset>
                </form>
            </div>
        </div>

        <div class="controls">
        <label for="tag-filter">Фильтр по тегу:</label>
        <select id="tag-filter">
            <option value="All">Все теги</option>
        </select>

        <label for="page-size">Строк на страницу:</label>
        <select id="page-size">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
        </select>

        <button id="prev-page" type="button">Назад</button>
        <span id="page-info">Страница 1</span>
        <button id="next-page" type="button">Вперед</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Tag</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="nodes-body"></tbody>
        </table>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Редактировать узел</h2>
                <button type="button" id="close-edit-modal" class="modal-close">&times;</button>
            </div>
            <form id="edit-form">
                <div class="form-field">
                    <label for="edit-ip-input">IP Address</label>
                    <input type="text" id="edit-ip-input" placeholder="192.168.0.1" required />
                </div>
                <div class="form-field">
                    <label for="edit-type-select">Type</label>
                    <select id="edit-type-select" required>
                        <option value="USER">USER</option>
                        <option value="ROUTER">ROUTER</option>
                    </select>
                </div>
                <div class="form-field">
                    <label for="edit-tag-input">Tag</label>
                    <input type="text" id="edit-tag-input" placeholder="home" />
                </div>
                <div style="display: flex; gap: 8px; margin-top: 16px;">
                    <button type="submit" class="btn-primary">Сохранить</button>
                    <button type="button" id="close-edit-modal-btn" class="btn-secondary" onclick="document.getElementById('edit-modal').style.display='none';">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    </div>

    <script src="js/main.js"></script>
</body>
</html>
